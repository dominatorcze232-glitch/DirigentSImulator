<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirigent Simulator (Semi-Conductor Clone)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            margin: 10px 0 5px 0;
            font-weight: 300;
            letter-spacing: 2px;
        }

        #status {
            color: #aaa;
            margin-bottom: 15px;
            font-size: 14px;
        }

        #container {
            position: relative;
            width: 640px;
            height: 480px;
            background: #222;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            transform: scaleX(-1); /* Zrcadlové otočení pro přirozený pohyb */
            width: 640px;
            height: 480px;
        }

        canvas {
            z-index: 2;
        }

        #overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            pointer-events: none;
            text-align: center;
        }

        #bpm-display {
            font-size: 24px;
            font-weight: bold;
            color: #00ffcc;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 18px;
            background-color: #00ffcc;
            color: #111;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,255,204,0.4);
            transition: all 0.3s ease;
            z-index: 4;
        }

        #start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,255,204,0.6);
        }

        #start-btn:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
    </style>
</head>
<body>

    <h1>DIRIGENT SIMULATOR</h1>
    <div id="status">Načítám AI modely, prosím čekejte...</div>

    <button id="start-btn" disabled>SPUSTIT ORCHESTR</button>

    <div id="container" style="display:none; margin-top: 20px;">
        <video id="video" playsinline></video>
        <canvas id="canvas"></canvas>
        <div id="overlay">
            <div>Aktuální tempo orchestru:</div>
            <div id="bpm-display">0 BPM</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const statusDiv = document.getElementById('status');
        const container = document.getElementById('container');
        const bpmDisplay = document.getElementById('bpm-display');

        let detector;
        let synth;
        let sequence;
        let lastRightWristY = null;
        let lastTime = performance.now();
        let currentBpm = 120;

        // Definice tónů pro Beethovenovu skladbu "Pro Elišku" (Für Elise)
        const notes = [
            "E5", "D#5", "E5", "D#5", "E5", "B4", "D5", "C5", "A4", null,
            "C3", "E3", "A3", "C4", "E4", "A4", "B4", null,
            "E3", "G#3", "E4", "G#4", "B4", "C5"
        ];

        // 1. Inicializace aplikace a načtení AI modelů
        async function init() {
            try {
                // Nastavení TensorFlow.js a MoveNet detectoru
                await tf.ready();
                detector = await poseDetection.createDetector(
                    poseDetection.SupportedModels.MoveNet, 
                    { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
                );
                
                statusDiv.innerText = "Modely načteny. Povolte přístup k webkameře.";
                startBtn.disabled = false;
            } catch (error) {
                statusDiv.innerText = "Chyba při načítání modelů: " + error.message;
            }
        }

        // 2. Nastavení webkamery
        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: 640, height: 480 },
                audio: false
            });
            video.srcObject = stream;
            return new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    resolve(video);
                };
            });
        }

        // 3. Nastavení hudebního syntezátoru a sekvence (Tone.js)
        function setupAudio() {
            // Polyphonic Synth imitující jednoduchý orchestrální part
            synth = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: "triangle" },
                envelope: { attack: 0.1, decay: 0.3, sustain: 0.6, release: 0.4 }
            }).toDestination();

            let noteIndex = 0;
            
            // Nekonečná smyčka přehrávání tónů
            sequence = new Tone.Sequence((time, note) => {
                if (note) {
                    synth.triggerAttackRelease(note, "8n", time);
                }
            }, notes, "8n");

            Tone.Transport.bpm.value = currentBpm;
        }

        // Spuštění po kliknutí na tlačítko
        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';
            statusDiv.innerText = "Dirigujte pravou rukou nahoru a dolů pro ovládání tempa!";
            container.style.display = 'block';

            await setupCamera();
            video.play();
            
            // Inicializace audio kontextu prohlížeče
            await Tone.start();
            setupAudio();
            sequence.start(0);
            Tone.Transport.start();

            // Nastavení velikosti plátna podle videa
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            // Spuštění detekční smyčky
            detectPose();
        });

        // 4. Detekce pohybu v reálném čase
        async function detectPose() {
            const poses = await detector.estimatePoses(video);
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (poses.length > 0) {
                const pose = poses[0];
                
                // Získání souřadnic pravého zápěstí (Right Wrist)
                const rightWrist = pose.keypoints.find(kp => kp.name === 'right_wrist');

                // Vykreslení bodu na zápěstí, pokud je vidět
                if (rightWrist && rightWrist.score > 0.3) {
                    ctx.beginPath();
                    ctx.arc(canvas.width - rightWrist.x, rightWrist.y, 12, 0, 2 * Math.PI);
                    ctx.fillStyle = '#00ffcc';
                    ctx.fill();

                    // VÝPOČET TEMPA (Dirigování):
                    // Sledujeme rychlost změny vertikální (Y) pozice ruky
                    if (lastRightWristY !== null) {
                        const deltaY = Math.abs(rightWrist.y - lastRightWristY);
                        const currentTime = performance.now();
                        const deltaTime = currentTime - lastTime;

                        if (deltaTime > 0) {
                            // Výpočet rychlosti pohybu ruky
                            const speed = deltaY / deltaTime; 

                            // Mapování rychlosti na BPM (rozsah 40 až 240 BPM)
                            let targetBpm = Math.min(Math.max(speed * 1200, 40), 240);

                            // Vyhlazení změn tempa (Linear Interpolation)
                            currentBpm = currentBpm * 0.9 + targetBpm * 0.1;
                            
                            // Aplikace nového tempa do Tone.js
                            Tone.Transport.bpm.value = currentBpm;
                            bpmDisplay.innerText = `${Math.round(currentBpm)} BPM`;
                        }
                    }

                    lastRightWristY = rightWrist.y;
                    lastTime = performance.now();
                }
            }

            // Neustálé opakování vykreslovací smyčky
            requestAnimationFrame(detectPose);
        }

        // Spuštění přípravy aplikace při načtení stránky
        window.onload = init;
    </script>
</body>
</html>
