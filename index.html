<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktivní Orchestr - Klávesový Simulátor</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle, #1e1e38 0%, #0c0c14 100%);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh;
        }

        h1 {
            margin: 0 0 5px 0; font-weight: 300; letter-spacing: 3px; text-transform: uppercase;
        }

        #subtitle {
            color: #8a8a9e; margin-bottom: 30px; font-size: 14px;
        }

        #start-btn {
            padding: 15px 40px; font-size: 18px; letter-spacing: 1px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            color: #fff; border: none; border-radius: 30px; cursor: pointer; font-weight: bold;
            box-shadow: 0 10px 20px rgba(79,172,254,0.4);
            transition: all 0.3s ease;
        }
        #start-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(79,172,254,0.6); }

        #orchestra-floor {
            display: none; flex-direction: column; gap: 20px;
            width: 90%; max-width: 800px; background: rgba(255,255,255,0.03);
            padding: 25px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);
        }

        .instrument-section {
            background: rgba(0, 0, 0, 0.3); padding: 15px; border-radius: 8px;
            border-left: 5px solid #fff;
        }
        .section-piano { border-color: #ff007f; }
        .section-strings { border-color: #00f2fe; }
        .section-brass { border-color: #ffb300; }

        .section-title {
            font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; color: #aaa;
        }

        .key-container {
            display: flex; gap: 10px; flex-wrap: wrap;
        }

        .key-box {
            background: #222; border: 1px solid #444; border-radius: 6px;
            padding: 15px; min-width: 45px; text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.1s ease;
        }

        .key-box .letter {
            font-size: 20px; font-weight: bold; display: block; margin-bottom: 2px;
        }
        .key-box .note {
            font-size: 11px; color: #777; text-transform: uppercase;
        }

        /* Aktivní stavy při stisku klávesy */
        .section-piano .key-box.active { background: #ff007f; border-color: #ff007f; transform: scale(0.95); box-shadow: 0 0 15px #ff007f; }
        .section-strings .key-box.active { background: #00f2fe; border-color: #00f2fe; color: #000; transform: scale(0.95); box-shadow: 0 0 15px #00f2fe; }
        .section-strings .key-box.active .note { color: #333; }
        .section-brass .key-box.active { background: #ffb300; border-color: #ffb300; color: #000; transform: scale(0.95); box-shadow: 0 0 15px #ffb300; }
        .section-brass .key-box.active .note { color: #333; }
    </style>
</head>
<body>

    <h1>Můj PC Orchestr</h1>
    <div id="subtitle">Mačkejte klávesy na klávesnici a ovládejte nástroje</div>

    <button id="start-btn">AKTIVOVAT ORCHESTR</button>

    <div id="orchestra-floor">
        <div class="instrument-section section-piano">
            <div class="section-title">Grand Piano (Klávesy A až K)</div>
            <div class="key-container" id="piano-keys"></div>
        </div>

        <div class="instrument-section section-strings">
            <div class="section-title">Smyčcový orchestr (Strings - Klávesy Q až I)</div>
            <div class="key-container" id="strings-keys"></div>
        </div>

        <div class="instrument-section section-brass">
            <div class="section-title">Žesťové nástroje (Brass - Klávesy Y až M)</div>
            <div class="key-container" id="brass-keys"></div>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const orchestraFloor = document.getElementById('orchestra-floor');

        // Mapování kláves na nástroje a tóny
        // Vyšší číslo u tónu (např. C5) znamená vyšší tón, nižší (C3) znamená hluboký basový tón
        const keyMap = {
            // PIANO (Řada A, S, D...)
            'a': { instrument: 'piano', note: 'C3', label: 'Nízké C' },
            's': { instrument: 'piano', note: 'E3', label: 'E' },
            'd': { instrument: 'piano', note: 'G3', label: 'G' },
            'f': { instrument: 'piano', note: 'C4', label: 'Střední C' },
            'g': { instrument: 'piano', note: 'E4', label: 'E' },
            'h': { instrument: 'piano', note: 'G4', label: 'G' },
            'j': { instrument: 'piano', note: 'C5', label: 'Vysoké C' },
            'k': { instrument: 'piano', note: 'E5', label: 'Vysoké E' },

            // SMYČCE (Řada Q, W, E...)
            'q': { instrument: 'strings', note: 'C4', label: 'C' },
            'w': { instrument: 'strings', note: 'D4', label: 'D' },
            'e': { instrument: 'strings', note: 'E4', label: 'E' },
            'r': { instrument: 'strings', note: 'F4', label: 'F' },
            't': { instrument: 'strings', note: 'G4', label: 'G' },
            'z': { instrument: 'strings', note: 'A4', label: 'A' },
            'u': { instrument: 'strings', note: 'B4', label: 'B' },
            'i': { instrument: 'strings', note: 'C5', label: 'Vysoké C' },

            // ŽESTĚ (Spodní řada Y, X, C...)
            'y': { instrument: 'brass', note: 'C3', label: 'Hluboké C' },
            'x': { instrument: 'brass', note: 'G3', label: 'G' },
            'c': { instrument: 'brass', note: 'C4', label: 'C' },
            'v': { instrument: 'brass', note: 'E4', label: 'E' },
            'b': { instrument: 'brass', note: 'G4', label: 'G' },
            'n': { instrument: 'brass', note: 'B4', label: 'B' },
            'm': { instrument: 'brass', note: 'C5', label: 'C' }
        };

        let instruments = {};

        // Vytvoření virtuálních nástrojů
        function setupInstruments() {
            // 1. Piano - Čistý, perkusivní zvuk s rychlým náběhem
            instruments.piano = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: "sine" },
                envelope: { attack: 0.005, decay: 0.1, sustain: 0.3, release: 1 }
            }).toDestination();

            // 2. Smyčce - Pomalejší náběh (sawtooth vlna simuluje smyčec)
            instruments.strings = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: "sawtooth" },
                filter: { type: "lowpass", frequency: 1000 },
                envelope: { attack: 0.2, decay: 0.3, sustain: 0.8, release: 0.8 }
            }).toDestination();

            // 3. Žestě (Trubky/Trombóny) - Průrazný čtvercový zvuk
            instruments.brass = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: "square" },
                filter: { type: "lowpass", frequency: 1500 },
                envelope: { attack: 0.08, decay: 0.2, sustain: 0.6, release: 0.4 }
            }).toDestination();
        }

        // Vygenerování vizuálních tlačítek na obrazovce
        function renderVisualKeys() {
            for (const [key, data] of Object.entries(keyMap)) {
                const targetContainer = document.getElementById(`${data.instrument}-keys`);
                
                const keyBox = document.createElement('div');
                keyBox.className = 'key-box';
                keyBox.id = `key-${key}`;
                keyBox.innerHTML = `
                    <span class="letter">${key.toUpperCase()}</span>
                    <span class="note">${data.label}</span>
                `;
                
                targetContainer.appendChild(keyBox);
            }
        }

        // Spuštění po kliknutí na hlavní tlačítko
        startBtn.addEventListener('click', async () => {
            await Tone.start(); // Povolení audia v prohlížeči
            setupInstruments();
            renderVisualKeys();
            
            startBtn.style.display = 'none';
            orchestraFloor.style.display = 'flex';
        });

        // REAKCE NA STISK KLÁVESY
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            // Pokud klávesu máme v mapě a zrovna se neopakuje (při držení)
            if (keyMap[key] && !e.repeat) {
                const data = keyMap[key];
                
                // Zahraj tón daným nástrojem (tón, délka trvání "8n" = osminová nota)
                instruments[data.instrument].triggerAttack(data.note);
                
                // Přidej vizuální efekt
                const element = document.getElementById(`key-${key}`);
                if (element) element.classList.add('active');
            }
        });

        // REAKCE NA PUŠTĚNÍ KLÁVESY
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            
            if (keyMap[key]) {
                const data = keyMap[key];
                
                // Uvolni tón nástroje
                instruments[data.instrument].triggerRelease(data.note);
                
                // Odeber vizuální efekt
                const element = document.getElementById(`key-${key}`);
                if (element) element.classList.remove('active');
            }
        });
    </script>
</body>
</html>
